services:
  db:
    container_name: fmi-db
    image: pgvector/pgvector:pg18-trixie
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "6543:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/18

volumes:
  postgres_data:
    driver: local
